<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upload and optimise images — convert to WebP, resize, or both. Fast processing with Sharp.js." />
  <title>Image Optimizer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>Image Optimizer</h1>
      <p class="subtitle">Convert, resize &amp; compress your images</p>
    </header>

    <main>
      <!-- Upload -->
      <section class="card" id="upload-section">
        <div class="drop-zone" id="drop-zone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p>Drag &amp; drop an image here</p>
          <span class="drop-zone__or">or</span>
          <label class="btn btn--outline" for="file-input">Browse Files</label>
          <input type="file" id="file-input" class="sr-only" accept="image/*" />
        </div>
        <p class="file-name" id="file-name"></p>
      </section>

      <!-- Options -->
      <section class="card" id="options-section">
        <h2>Optimisation Options</h2>

        <div class="options-grid">
          <label class="option-card" data-mode="webp">
            <input type="radio" name="mode" value="webp" checked />
            <div class="option-card__inner">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21"/>
              </svg>
              <strong>WebP</strong>
              <span>Convert to 70% quality WebP</span>
            </div>
          </label>

          <label class="option-card" data-mode="resize">
            <input type="radio" name="mode" value="resize" />
            <div class="option-card__inner">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
              </svg>
              <strong>Resize</strong>
              <span>Scale image dimensions</span>
            </div>
          </label>

          <label class="option-card" data-mode="resize-and-optimise">
            <input type="radio" name="mode" value="resize-and-optimise" />
            <div class="option-card__inner">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <strong>Resize &amp; Optimise</strong>
              <span>Resize + convert to WebP</span>
            </div>
          </label>
        </div>

        <div class="scale-control" id="scale-control">
          <label for="scale-range">Scale: <span id="scale-value">50</span>%</label>
          <input type="range" id="scale-range" min="10" max="90" value="50" step="1" />
          <div class="scale-labels">
            <span>10%</span>
            <span>90%</span>
          </div>
        </div>

        <button class="btn btn--primary" id="optimise-btn" disabled>Optimise</button>
      </section>

      <!-- Result -->
      <section class="card result-card" id="result-section" hidden>
        <h2>Result</h2>
        <div class="result-stats" id="result-stats"></div>
        <a class="btn btn--primary" id="download-btn" download>Download Optimised Image</a>
      </section>

      <!-- Loader -->
      <div class="loader-overlay" id="loader" hidden>
        <div class="loader-spinner"></div>
        <p>Optimising…</p>
      </div>

      <!-- History -->
      <section class="card" id="history-section">
        <h2>History</h2>
        <div class="history-list" id="history-list">
          <p class="history-empty">No optimisations yet.</p>
        </div>
      </section>
    </main>

  </div>

  <script src="/script.js"></script>
</body>
</html>
